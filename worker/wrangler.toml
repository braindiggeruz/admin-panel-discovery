name = "shashki-royale-admin-api"
main = "src/index.ts"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]

# NOTE: do not deploy yet. Run `wrangler secret put` for:
#   SUPABASE_URL          (plain — fine to be in vars, but kept as secret for symmetry)
#   SUPABASE_SERVICE_ROLE_KEY  (CRITICAL — never put in vars)
#   JWT_SECRET            (256-bit random)
#   ARGON2_PEPPER         (256-bit random)

[vars]
ALLOW_ORIGIN = "https://shashki-royale-admin.pages.dev"
SESSION_TTL_SECONDS = "28800"  # 8 hours
